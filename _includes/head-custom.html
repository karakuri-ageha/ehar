<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  document.addEventListener('DOMContentLoaded', () => {
    // Jekyll が ```mermaid を <pre><code class="language-mermaid"> に変換するので、
    // それを Mermaid が認識できる <div class="mermaid"> に差し替える
    document.querySelectorAll('pre code.language-mermaid').forEach((codeBlock) => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = codeBlock.textContent;
      codeBlock.parentElement.replaceWith(div);
    });

    mermaid.initialize({ startOnLoad: true, theme: 'dark' });
    mermaid.run().then(() => {
      document.querySelectorAll('.quadrant-label text, .quadrant-yAxis text, .quadrant-xAxis text, .quadrant-title text').forEach((el) => {
        el.style.fill = '#333333';
      });
    });
  });
</script>
